name: Keep ARit Warm

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Arit menu route
        run: |  
          response=$(curl -o /dev/null -s -w "%{https_code}" "https://arit.pk/menu/fryday-cafe")
          echo "Pinged https://arit.pk/menu/fryday-cafe - Status: $response"
          if ["$response" -ge 400 ]; then
            echo "::warning::ping failed with status $response"
            fi
