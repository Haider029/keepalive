name: Keep ARit Warm

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Arit menu route
        run: |  
          response=$(curl -L -o /dev/null -s -w "%{http_code}" "https://arit.pk/menu/fryday-cafe")
          echo "Pinged https://arit.pk/menu/fryday-cafe - Status: $response"
          if [ -z "$response" ] || [ "$response" -ge 400 ]; then
            echo "::error::ping failed with status '$response'"
            exit 1
            fi
